<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Instagram 계정 분석기 Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f5f0ff 0%, #fff0f5 100%);
      min-height: 100vh; padding: 30px 16px; color: #222;
    }
    header { text-align: center; margin-bottom: 36px; }
    header h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #833ab4, #fd1d1d, #fcb045);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    /* 드래그 앤 드롭 영역 스타일 */
    .upload-area {
      background: #fff; border: 2px dashed #ddd; border-radius: 16px;
      padding: 40px 20px; text-align: center; transition: all 0.3s;
      cursor: pointer; margin-bottom: 20px;
    }
    .upload-area.dragover {
      background: #f0ebff; border-color: #833ab4; transform: scale(1.02);
    }
    .upload-icon { font-size: 2.5rem; margin-bottom: 10px; display: block; }
    .upload-btn {
      display: inline-block; margin-top: 15px; padding: 10px 25px;
      background: #222; color: #fff; border-radius: 8px; font-weight: 600;
    }

    .card {
      background: #fff; border-radius: 16px; padding: 28px;
      margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }
    .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    .res-item { background: #fdfdfd; padding: 16px; border-radius: 12px; border: 1px solid #f0f0f0; text-align: center; }
    .res-val { display: block; font-size: 1.4rem; font-weight: 700; color: #333; margin-top: 4px; }
    .res-lbl { font-size: 0.75rem; color: #999; }
    .tag-item {
      display: inline-block; background: #f8f9fa; border: 1px solid #eee;
      padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; margin: 2px;
    }
    select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px; }
  </style>
</head>
<body>

<header>
  <h1>Instagram 계정 분석기</h1>
  <p>파일을 끌어다 놓거나 클릭하여 분석하세요</p>
</header>

<div class="upload-area" id="dropZone" onclick="document.getElementById('zipInput').click()">
  <span class="upload-icon">📂</span>
  <p style="font-weight: 600;">인스타그램 ZIP 파일을 여기에 드래그하세요</p>
  <p style="font-size: 0.85rem; color: #888; margin-top: 5px;">또는 화면을 클릭하여 파일 선택</p>
  <div class="upload-btn">파일 업로드</div>
  <input type="file" id="zipInput" accept=".zip" style="display:none" />
</div>

<p id="fileMeta" style="text-align:center; margin-bottom:20px; font-size:0.85rem; color:#888;"></p>

<div id="resultArea" style="display:none;">
  <div class="card">
    <h2>📊 분석 결과</h2>
    <div id="mainStats" class="res-grid"></div>
  </div>

  <div class="card">
    <h2>🎯 대중적 니치 태그 추천</h2>
    <select id="tagCategory" onchange="updateHashtags()">
      <option value="book">북스타그램 (기본)</option>
      <option value="food">맛집/푸드</option>
      <option value="daily">일상/데일리</option>
      <option value="workout">오운완/운동</option>
    </select>
    <div id="hashtagDisplay"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
  const tagData = {
    book: ["북스타그램", "책추천", "독서기록", "책리뷰", "문장수집", "독서모임"],
    food: ["먹스타그램", "맛집탐방", "내돈내산", "푸드스타그램", "카페투어"],
    daily: ["일상스타그램", "데일리룩", "소통", "좋아요반사", "감성사진"],
    workout: ["오운완", "헬스타그램", "운동기록", "필라테스", "다이어트"]
  };

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('zipInput');

  // 드래그 이벤트 핸들러
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, preventDefaults, false);
  });

  function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }

  ['dragenter', 'dragover'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
  });

  ['dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
  });

  // 파일 드롭 시 처리
  dropZone.addEventListener('drop', (e) => {
    const dt = e.dataTransfer;
    const files = dt.files;
    handleFiles(files[0]);
  });

  // 클릭 업로드 시 처리
  fileInput.addEventListener('change', (e) => {
    handleFiles(e.target.files[0]);
  });

  async function handleFiles(file) {
    if (!file || !file.name.endsWith('.zip')) {
      alert("ZIP 파일만 업로드 가능합니다.");
      return;
    }

    document.getElementById('fileMeta').textContent = "📦 " + file.name + " 분석 중...";
    try {
      const zip = await JSZip.loadAsync(file);
      let posts = 0, followers = 0, following = 0;

      for (const [path, obj] of Object.entries(zip.files)) {
        if (path.endsWith('.json')) {
          const content = await obj.async("text");
          const data = JSON.parse(content);

          if (path.includes('posts_1.json')) posts = data.length || 0;
          if (path.includes('followers_1.json')) {
            followers = data.length || (data.relationships_followers ? data.relationships_followers.length : 0);
          }
          if (path.includes('following.json')) {
            const fData = data.relationships_following || data;
            following = fData.length || 0;
          }
        }
      }

      document.getElementById('resultArea').style.display = 'block';
      document.getElementById('mainStats').innerHTML = `
        <div class="res-item"><span class="res-lbl">게시물</span><span class="res-val">${posts}</span></div>
        <div class="res-item"><span class="res-lbl">팔로워</span><span class="res-val">${followers}</span></div>
        <div class="res-item"><span class="res-lbl">팔로잉</span><span class="res-val">${following}</span></div>
        <div class="res-item"><span class="res-lbl">맞팔률</span><span class="res-val">${following > 0 ? Math.round((followers/following)*100) : 0}%</span></div>
      `;
      updateHashtags();
      document.getElementById('fileMeta').textContent = "✅ 분석이 완료되었습니다!";
      // 스크롤 아래로 이동
      document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
    } catch (err) {
      document.getElementById('fileMeta').textContent = "❌ 에러 발생: " + err.message;
    }
  }

  function updateHashtags() {
    const cat = document.getElementById('tagCategory').value;
    const tags = tagData[cat];
    document.getElementById('hashtagDisplay').innerHTML = tags.map(t => `<span class="tag-item">#${t}</span>`).join('');
  }
</script>
</body>
</html>
